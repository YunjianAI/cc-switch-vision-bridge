name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - run: python -m ruff check .
      - run: python -m pytest --cov=cc_switch_vision_bridge --cov-report=term-missing
      - name: Reject obvious secrets and local paths
        shell: pwsh
        run: |
          $patterns = @('D:\\shan\\hermes', 'C:\\Users\\shany', 'ANTHROPIC_AUTH_TOKEN\s*=', 'sk-[A-Za-z0-9]{16,}')
          foreach ($pattern in $patterns) {
            $matches = git grep -n -I -E $pattern -- ':!README.md' ':!.github/workflows/ci.yml'
            if ($LASTEXITCODE -eq 0) { throw "Forbidden pattern found: $pattern`n$matches" }
            if ($LASTEXITCODE -ne 1) { throw "git grep failed for pattern: $pattern" }
          }
          exit 0
